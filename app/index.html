<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a237e" />
  <title>Sleep Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <div id="app">
    <!-- ヘッダー -->
    <header class="header">
      <h1>😴 Sleep Tracker</h1>
    </header>

    <!-- 音声入力エリア -->
    <section class="card voice-section">
      <h2>音声で記録</h2>
      <p class="hint">例：「昨夜11時に就寝して今朝6時半に起床した」</p>
      <div class="voice-controls">
        <button id="btn-mic" class="btn btn-primary btn-large" onclick="toggleRecording()">
          🎤 音声入力開始
        </button>
      </div>
      <div id="transcript-box" class="transcript-box hidden">
        <p id="transcript-text"></p>
      </div>
    </section>

    <!-- 解析結果プレビュー -->
    <section id="preview-section" class="card hidden">
      <h2>解析結果</h2>
      <div id="events-preview"></div>
      <div class="action-row">
        <button class="btn btn-outline" onclick="clearPreview()">やり直す</button>
        <button class="btn btn-primary" onclick="registerToCalendar()">カレンダーに登録</button>
      </div>
    </section>

    <!-- ステータスメッセージ -->
    <div id="status-msg" class="status-msg hidden"></div>

    <!-- 睡眠統計ダッシュボード -->
    <section class="card dashboard-section">
      <h2>睡眠統計</h2>
      <div id="dashboard-loading" class="loading-text">読み込み中...</div>
      <div id="dashboard-content" class="hidden">
        <div class="stats-grid">
          <div class="stat-tile">
            <span class="stat-label">平均睡眠時間</span>
            <span id="stat-avg" class="stat-value">--</span>
            <span class="stat-unit">時間</span>
          </div>
          <div class="stat-tile">
            <span class="stat-label">昼寝回数</span>
            <span id="stat-nap" class="stat-value">--</span>
            <span class="stat-unit">回</span>
          </div>
          <div class="stat-tile">
            <span class="stat-label">平均就寝時刻</span>
            <span id="stat-bedtime" class="stat-value">--</span>
          </div>
          <div class="stat-tile">
            <span class="stat-label">平均起床時刻</span>
            <span id="stat-waketime" class="stat-value">--</span>
          </div>
        </div>
        <div class="chart-area">
          <canvas id="sleep-chart"></canvas>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
